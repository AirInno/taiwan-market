name: Update Holder Count (Weekly)

on:
  schedule:
    - cron: '0 2 * * 1'  # 每週一 UTC 02:00（台灣時間 10:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Run holder count update
        run: python scripts/update_holders.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add holder-weekly.json
          git diff --staged --quiet || git commit -m "chore: update holder count $(date +%Y%m%d)"
          git push
