name: 更新台股簡報索引

on:
  push:
    paths:
      - 'briefings/*-tw.md'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 更新 briefings-tw-index.json
        run: |
          python3 - <<'EOF'
          import json, os, glob

          files = sorted(glob.glob('briefings/*-tw.md'), reverse=True)
          dates = [os.path.basename(f).replace('-tw.md', '') for f in files]

          with open('briefings-tw-index.json', 'w', encoding='utf-8') as fp:
              json.dump(dates, fp, ensure_ascii=False)
          print(f'更新完成，共 {len(dates)} 筆，最新：{dates[0] if dates else "none"}')
          EOF

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefings-tw-index.json
          if git diff --staged --quiet; then
            echo "無變更"
          else
            git commit -m "📋 自動更新台股簡報索引"
            git push
          fi
