name: traffic-logger

on:
  schedule:
    - cron: '0 22 * * 1'   # 每週一 22:00 UTC ＝ 台灣時間週二 06:00
  workflow_dispatch:        # 手動觸發（測試用）

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 記錄 GitHub Traffic（views/clones，累積超過 14 天）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONIOENCODING: utf-8
        run: python scripts/log_traffic.py

      - name: commit & push（有變動才推）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add traffic-history.json
          git diff --cached --quiet && echo "無變動，略過 push" || \
            git commit -m "auto: 記錄本週流量統計" && git push
