name: 川普分析信通知

on:
  push:
    paths:
      - 'briefings/*-trump.md'

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 取得最新 trump briefing 內容
        id: briefing
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD | grep 'briefings/.*-trump\.md' | head -1)
          if [ -z "$FILE" ]; then
            echo "找不到新的 trump briefing 檔案"
            exit 0
          fi
          DATE=$(basename "$FILE" -trump.md)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          # 讀取檔案內容（限制長度避免超過環境變數限制）
          CONTENT=$(head -c 8000 "$FILE")
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 發送分析信
        if: steps.briefing.outputs.date != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ANALYSIS_EMAIL_USER }}
          password: ${{ secrets.ANALYSIS_EMAIL_PASSWORD }}
          subject: "🇺🇸 川普動態分析 ${{ steps.briefing.outputs.date }}"
          to: a11000033a10025818@gmail.com
          from: ${{ secrets.ANALYSIS_EMAIL_USER }}
          body: ${{ steps.briefing.outputs.content }}
