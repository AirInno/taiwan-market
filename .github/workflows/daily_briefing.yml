name: 每日自動簡報

on:
  # 主觸發：台股資料更新完成後立即執行
  workflow_run:
    workflows: ["自動更新台股外資資料"]
    types: [completed]
    branches: [main]

  # 備用排程：週一至週五 台灣時間 16:30（UTC 08:30）
  # 確保即使 workflow_run 未觸發也能正常執行
  schedule:
    - cron: '30 8 * * 1-5'

  # 手動觸發（補跑、測試用）
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    # workflow_run 觸發時，只在上游成功時才跑；排程/手動觸發則直接跑
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write

    steps:
      - name: Checkout（取最新 main）
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 anthropic SDK
        run: pip install anthropic

      - name: 產生每日簡報
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_briefing.py

      - name: Commit & push 簡報檔案
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefings/
          if git diff --staged --quiet; then
            echo "今日簡報已存在或無新資料，跳過 commit。"
          else
            DATE=$(date -u +"%Y%m%d")
            git commit -m "📋 ${DATE} 自動產生每日簡報"
            git push
          fi
