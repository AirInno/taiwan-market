name: 自動更新台股外資資料

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: 執行資料更新腳本
        run: python scripts/update_data.py
      - name: Commit & push（若有更新）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data-latest.json
          if git diff --staged --quiet; then
            echo "今日無新資料，跳過 commit"
          else
            git commit -m "📊 $(date +'%Y%m%d') 自動更新台股外資追蹤數據"
            git push
          fi
