name: 月度績效審計通知

on:
  push:
    paths:
      - 'briefings/*-monthly-review.md'
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 取得月度報告內容
        id: briefing
        run: |
          FILE=$(ls briefings/*-monthly-review.md 2>/dev/null | sort | tail -1)
          if [ -z "$FILE" ] || [ ! -f "$FILE" ]; then
            echo "月度報告檔案不存在"
            exit 0
          fi
          MONTH=$(basename "$FILE" -monthly-review.md)
          echo "month=$MONTH" >> $GITHUB_OUTPUT
          CONTENT=$(head -c 8000 "$FILE")
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 發送月度報告信
        if: steps.briefing.outputs.month != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.ANALYSIS_EMAIL_USER }}
          password: ${{ secrets.ANALYSIS_EMAIL_PASSWORD }}
          subject: "📊 月度績效審計 ${{ steps.briefing.outputs.month }}"
          to: a11000033a10025818@gmail.com
          from: ${{ secrets.ANALYSIS_EMAIL_USER }}
          body: ${{ steps.briefing.outputs.content }}
