name: YouTube 字幕自動抓取

# 【已停用自動排程】2026-06-16 改用本機 Windows 排程（fetch_youtube.bat）抓字幕，
# 因 GitHub 機房 IP 會被 YouTube 封鎖。此檔保留僅供手動測試（workflow_dispatch）。
on:
  workflow_dispatch:

jobs:
  fetch-transcript:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install youtube-transcript-api requests

      - name: Fetch transcript
        env:
          # 選用：填了住宅代理就用代理抓字幕，繞過 GitHub 機房 IP 被 YouTube 封鎖的問題
          WEBSHARE_PROXY_USERNAME: ${{ secrets.WEBSHARE_PROXY_USERNAME }}
          WEBSHARE_PROXY_PASSWORD: ${{ secrets.WEBSHARE_PROXY_PASSWORD }}
        run: |
          cat > /tmp/fetch.py << 'PYEOF'
          import requests, xml.etree.ElementTree as ET, os, sys, time
          from datetime import datetime, timezone, timedelta
          from youtube_transcript_api import YouTubeTranscriptApi

          CHANNEL_ID = "UC0lbAQVpenvfA2QqzsRtL_g"
          TZ_TAIPEI = timezone(timedelta(hours=8))
          RSS_URL = f"https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}"

          # --- 建立 API（有住宅代理就用代理，繞過機房 IP 封鎖）---
          proxy_user = os.environ.get("WEBSHARE_PROXY_USERNAME", "").strip()
          proxy_pass = os.environ.get("WEBSHARE_PROXY_PASSWORD", "").strip()
          if proxy_user and proxy_pass:
              try:
                  from youtube_transcript_api.proxies import WebshareProxyConfig
                  api = YouTubeTranscriptApi(proxy_config=WebshareProxyConfig(
                      proxy_username=proxy_user, proxy_password=proxy_pass))
                  print("✅ 已啟用 Webshare 住宅代理抓字幕")
              except Exception as e:
                  print(f"⚠️ 代理設定失敗，改用直連：{e}")
                  api = YouTubeTranscriptApi()
          else:
              print("ℹ️ 未設定 Webshare 代理（直連 YouTube，GitHub 機房 IP 可能被封鎖）")
              api = YouTubeTranscriptApi()

          # --- 抓 RSS ---
          for attempt in range(3):
              try:
                  resp = requests.get(RSS_URL, timeout=30)
                  resp.raise_for_status()
                  break
              except Exception as e:
                  if attempt == 2:
                      raise RuntimeError(f"YouTube RSS 連續失敗 3 次：{e}")
                  print(f"YouTube RSS 失敗，10 秒後重試 ({attempt+1}/3)：{e}")
                  time.sleep(10)

          ns = {'atom': 'http://www.w3.org/2005/Atom',
                'yt': 'http://www.youtube.com/xml/schemas/2015'}
          root = ET.fromstring(resp.content)

          now = datetime.now(timezone.utc)
          cutoff = now - timedelta(hours=5)

          new_video_pending = []   # 在時間窗內、尚無字稿的新片
          fetch_errors = []        # 抓字幕時真正報錯的影片
          saved = 0

          for entry in root.findall('atom:entry', ns):
              pub = datetime.fromisoformat(
                  entry.find('atom:published', ns).text.replace('Z', '+00:00'))
              if pub < cutoff:
                  continue

              vid_id = entry.find('yt:videoId', ns).text
              title = entry.find('atom:title', ns).text
              date_str = pub.astimezone(TZ_TAIPEI).strftime('%Y%m%d')
              out_file = f"briefings/{date_str}-youtube-transcript.md"

              if os.path.exists(out_file):
                  print(f"已存在，略過：{out_file}")
                  continue

              new_video_pending.append(f"{date_str} {title} ({vid_id})")
              print(f"新影片：{title} ({vid_id})")

              try:
                  t = api.fetch(vid_id, languages=['zh-TW', 'zh-Hant', 'zh'])
                  text = ' '.join([s.text for s in t])
                  if len(text) < 100:
                      print(f"字幕內容太短，略過：{vid_id}")
                      continue
              except Exception as e:
                  print(f"❌ 抓字幕失敗：{vid_id} ({e})")
                  fetch_errors.append(f"{date_str} {vid_id}: {e}")
                  continue

              with open(out_file, 'w', encoding='utf-8') as f:
                  f.write(f"# {title}\n\n")
                  f.write(f"- 影片ID: {vid_id}\n")
                  f.write(f"- 發布時間: {pub.astimezone(TZ_TAIPEI).strftime('%Y-%m-%d %H:%M')} 台灣時間\n")
                  f.write(f"- 連結: https://www.youtube.com/watch?v={vid_id}\n\n")
                  f.write("---\n\n## 逐字稿\n\n")
                  f.write(text)

              print(f"✅ 字幕已存：{out_file}")
              saved += 1

          if not new_video_pending:
              print("本次無新影片需要處理")
              sys.exit(0)

          # 有新片但一份都沒抓成功 → 視為失敗，觸發通知信（不再靜默成功）
          if saved == 0 and fetch_errors:
              print("=" * 50)
              print("⚠️ 偵測到新影片，但字幕全部抓取失敗（最可能：GitHub 機房 IP 被 YouTube 封鎖）")
              print("待處理影片：")
              for v in new_video_pending:
                  print("  -", v)
              print("錯誤明細：")
              for e in fetch_errors:
                  print("  -", e)
              print("建議：於 GitHub Secrets 設定 WEBSHARE_PROXY_USERNAME / WEBSHARE_PROXY_PASSWORD 啟用住宅代理")
              print("=" * 50)
              sys.exit(1)
          PYEOF
          python3 /tmp/fetch.py

      - name: Commit and push
        if: always()
        run: |
          git config user.email "agent@briefing.bot"
          git config user.name "YouTube Transcript Bot"
          git add briefings/*-youtube-transcript.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "無新字幕，略過 commit"
          else
            git commit -m "youtube-transcript: $(TZ='Asia/Taipei' date +%Y%m%d)"
            git push
          fi

      - name: 失敗通知
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.ANALYSIS_EMAIL_USER }}
          password: ${{ secrets.ANALYSIS_EMAIL_PASSWORD }}
          subject: "❌ YouTube 字幕抓取失敗（偵測到新片卻抓不到字幕）"
          to: a11000033a10025818@gmail.com
          from: ${{ secrets.ANALYSIS_EMAIL_USER }}
          body: |
            youtube_transcript.yml 偵測到游庭皓有新直播，但字幕抓取失敗。
            最可能原因：GitHub Actions 機房 IP 被 YouTube 封鎖。
            治本方式：申請 Webshare 住宅代理，於 repo 的 Settings > Secrets 新增
            WEBSHARE_PROXY_USERNAME 與 WEBSHARE_PROXY_PASSWORD 兩個 secret。
            詳細錯誤請見 GitHub Actions 執行日誌。
