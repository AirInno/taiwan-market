name: YouTube 字幕自動抓取

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  fetch-transcript:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install youtube-transcript-api requests

      - name: Fetch transcript
        run: |
          cat > /tmp/fetch.py << 'PYEOF'
          import requests, xml.etree.ElementTree as ET, os, json
          from datetime import datetime, timezone, timedelta
          from youtube_transcript_api import YouTubeTranscriptApi

          CHANNEL_ID = "UC0lbAQVpenvfA2QqzsRtL_g"
          TZ_TAIPEI = timezone(timedelta(hours=8))
          RSS_URL = f"https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}"

          import time
          for attempt in range(3):
              try:
                  resp = requests.get(RSS_URL, timeout=30)
                  resp.raise_for_status()
                  break
              except Exception as e:
                  if attempt == 2:
                      raise RuntimeError(f"YouTube RSS 連續失敗 3 次：{e}")
                  print(f"YouTube RSS 失敗，10 秒後重試 ({attempt+1}/3)：{e}")
                  time.sleep(10)

          ns = {
              'atom': 'http://www.w3.org/2005/Atom',
              'yt': 'http://www.youtube.com/xml/schemas/2015',
          }
          root = ET.fromstring(resp.content)

          now = datetime.now(timezone.utc)
          cutoff = now - timedelta(hours=5)

          api = YouTubeTranscriptApi()
          found = False

          for entry in root.findall('atom:entry', ns):
              pub = datetime.fromisoformat(
                  entry.find('atom:published', ns).text.replace('Z', '+00:00'))
              if pub < cutoff:
                  continue

              vid_id = entry.find('yt:videoId', ns).text
              title = entry.find('atom:title', ns).text
              date_str = pub.astimezone(TZ_TAIPEI).strftime('%Y%m%d')
              out_file = f"briefings/{date_str}-youtube-transcript.md"

              if os.path.exists(out_file):
                  print(f"已存在，略過：{out_file}")
                  continue

              print(f"新影片：{title} ({vid_id})")

              try:
                  t = api.fetch(vid_id, languages=['zh-TW', 'zh-Hant', 'zh'])
                  text = ' '.join([s.text for s in t])
                  if len(text) < 100:
                      print(f"字幕內容太短，略過：{vid_id}")
                      continue
              except Exception as e:
                  print(f"字幕尚未生成，下次再試：{vid_id} ({e})")
                  continue

              with open(out_file, 'w', encoding='utf-8') as f:
                  f.write(f"# {title}\n\n")
                  f.write(f"- 影片ID: {vid_id}\n")
                  f.write(f"- 發布時間: {pub.astimezone(TZ_TAIPEI).strftime('%Y-%m-%d %H:%M')} 台灣時間\n")
                  f.write(f"- 連結: https://www.youtube.com/watch?v={vid_id}\n\n")
                  f.write("---\n\n## 逐字稿\n\n")
                  f.write(text)

              print(f"✅ 字幕已存：{out_file}")
              found = True

          if not found:
              print("本次無新影片需要處理")
          PYEOF
          python3 /tmp/fetch.py

      - name: Commit and push
        run: |
          git config user.email "agent@briefing.bot"
          git config user.name "YouTube Transcript Bot"
          git add briefings/*-youtube-transcript.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "無新字幕，略過 commit"
          else
            git commit -m "youtube-transcript: $(TZ='Asia/Taipei' date +%Y%m%d)"
            git push
          fi

      - name: 失敗通知
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.ANALYSIS_EMAIL_USER }}
          password: ${{ secrets.ANALYSIS_EMAIL_PASSWORD }}
          subject: "❌ YouTube 字幕抓取失敗 $(date +'%Y-%m-%d')"
          to: a11000033a10025818@gmail.com
          from: ${{ secrets.ANALYSIS_EMAIL_USER }}
          body: "youtube_transcript.yml 執行失敗，請至 GitHub Actions 查看錯誤日誌。"
